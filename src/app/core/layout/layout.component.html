<mat-toolbar class="header">
  <div class="header-inner">
    <p class="logo" routerLink="/">
      SoDough Bakery
    </p>

    <span class="spacer"></span>

    <nav class="nav">
      <a mat-button routerLink="/">Home</a>
      <a mat-button routerLink="/about-us">About Us</a>
      <a mat-button routerLink="/reviews">Reviews</a>
      <a mat-flat-button routerLink="/menu">Order</a>

      <button mat-icon-button 
              matBadgeColor="accent"
              aria-label="Open cart"
              [matBadge]="itemCount()" 
              [matBadgeHidden]="itemCount() === 0"
              (click)="openCart()">
        <mat-icon>shopping_cart</mat-icon>
      </button>
    </nav>
  </div>
</mat-toolbar>

<main class="main">
  <router-outlet></router-outlet>
</main>

<footer class="footer">
  <p>Fresh baked sourdough • Laguna Niguel</p>
</footer>
