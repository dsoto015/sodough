<section class="menu">
  <div class="menu-header">
    <h1 class="menu-title">Our Menu</h1>
  </div>

  <div class="menu-grid">
    <mat-card class="menu-card" *ngFor="let item of menuItems">
      <img mat-card-image [src]="item.image" [alt]="item.alt" />

      <mat-card-content>
        <h2>{{ item.name }}</h2>
        <p>{{ item.description }}</p>
        <span class="price">{{ item.displayPrice }}</span>
      </mat-card-content>

      <mat-card-actions>
        <button mat-raised-button color="primary" (click)="addToOrder(item)">
          Add to Order
        </button>
      </mat-card-actions>
    </mat-card>
  </div>
</section>
